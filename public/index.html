<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tracked Expenses</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f9f9fb; color: #333; }
        h1 { color: #4f46e5; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background-color: #4f46e5; color: white; font-weight: 600; }
        tr:hover { background-color: #f1f5f9; }
        .amount { font-weight: bold; color: #10b981; }
    </style>
</head>
<body>

    <h1>📋 Your Saved Expenses</h1>
    <p>Viewing live data tracked from your cloud database:</p>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Vendor</th>
                <th>Amount</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody id="expense-rows">
            <tr>
                <td colspan="6" style="text-align: center; color: #718096;">Loading expenses from the cloud...</td>
            </tr>
        </tbody>
    </table>

    <script>
        // Fetch data from our new API endpoint automatically when the page loads
        async function loadExpenses() {
            try {
                const response = await fetch('/api/view-data');
                const expenses = await response.json();
                
                const tableBody = document.getElementById('expense-rows');
                tableBody.innerHTML = ''; // Clear loading text

                if (expenses.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="6" style="text-align: center;">No expenses recorded yet.</td></tr>`;
                    return;
                }

                // Loop through every expense row and add it to the page
                expenses.forEach(expense => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${expense.id}</td>
                        <td><strong>${expense.title}</strong></td>
                        <td>${expense.category}</td>
                        <td>${expense.vendor_name || 'N/A'}</td>
                        <td class="amount">$${parseFloat(expense.amount).toFixed(2)}</td>
                        <td>${new Date(expense.created_at).toLocaleDateString()}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
                console.error("Error fetching dashboard rows:", error);
                document.getElementById('expense-rows').innerHTML = 
                    `<tr><td colspan="6" style="text-align: center; color: #ef4444;">Failed to load cloud entries.</td></tr>`;
            }
        }

        // Execute the fetch configuration on screen mount
        window.onload = loadExpenses;
    </script>
</body>
</html>
