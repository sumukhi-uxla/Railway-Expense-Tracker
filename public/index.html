<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Your Expenses</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background-color: #f4f4f9; }
        .form-container { background: white; padding: 25px; border-radius: 8px; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #4f46e5; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #4338ca; }
        #status-message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; font-weight: bold; }
        .success { background-color: #d1fae5; color: #065f46; border: 1px solid #34d399; }
        .error { background-color: #fee2e2; color: #991b1b; border: 1px solid #f87171; }
    </style>
</head>
<body>

    <h2>💰 Add New Expense</h2>

    <div class="form-container">
        <form id="expense-form">
            <div class="form-group">
                <label for="title">Item Title:</label>
                <input type="text" id="title" placeholder="e.g., Office Supplies" required>
            </div>

            <div class="form-group">
                <label for="amount">Amount ($):</label>
                <input type="number" id="amount" step="0.01" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="category">Category:</label>
                <select id="category" required>
                    <option value="">-- Select Category --</option>
                    <option value="Software">Software/Tools</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Travel">Travel</option>
                    <option value="Operations">Operations</option>
                </select>
            </div>

            <div class="form-group">
                <label for="vendor_id">Vendor ID (Optional):</label>
                <input type="number" id="vendor_id" placeholder="Leave blank or type vendor ID number">
            </div>

            <button type="submit">Save Expense to Cloud</button>
        </form>

        <div id="status-message"></div>
    </div>

    <script>
        document.getElementById('expense-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const statusDiv = document.getElementById('status-message');
            statusDiv.style.display = 'none';

            // Collect variables to perfectly match server.js req.body parameters
            const formData = {
                title: document.getElementById('title').value,
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value,
                vendor_id: document.getElementById('vendor_id').value || null
            };

            try {
                const response = await fetch('/api/expenses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    statusDiv.className = 'status-message success';
                    statusDiv.innerHTML = `✅ Success! Database acknowledged: ${result.message}`;
                    statusDiv.style.display = 'block';
                    document.getElementById('expense-form').reset();
                } else {
                    statusDiv.className = 'status-message error';
                    statusDiv.innerHTML = `❌ Failed to save: ${result.error || 'Server error'}`;
                    statusDiv.style.display = 'block';
                }
            } catch (err) {
                statusDiv.className = 'status-message error';
                statusDiv.innerHTML = `❌ Connection Mismatch: Ensure you have deployed the backend server changes.`;
                statusDiv.style.display = 'block';
            }
        });
    </script>

</body>
</html>
