<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Organization Expense Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        form { display: flex; gap: 10px; margin-bottom: 20px; }
        input, select, button { padding: 8px; }
        .expense-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; align-items: center; }
        .delete-btn { color: red; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <h2>Corporate Expense Tracker</h2>
    
    <form id="expenseForm">
        <input type="text" id="title" placeholder="Item/Vendor" required>
        <input type="number" id="amount" placeholder="Amount" step="0.01" required>
        <select id="category">
            <option value="Software">Software/SaaS</option>
            <option value="Marketing">Marketing</option>
            <option value="Travel">Travel</option>
            <option value="Office">Office Supplies</option>
        </select>
        <button type="submit">Add</button>
    </form>

    <div id="expenseList"></div>

    <script>
        const form = document.getElementById('expenseForm');
        const list = document.getElementById('expenseList');

        // Fetch and show expenses
        async function loadExpenses() {
            list.innerHTML = '';
            const res = await fetch('/api/expenses');
            const data = await res.json();
            data.forEach(exp => {
                const div = document.createElement('div');
                div.className = 'expense-item';
                div.innerHTML = `
                    <span><strong>${exp.title}</strong> - $${exp.amount} (${exp.category})</span>
                    <button class="delete-btn" onclick="deleteExpense(${exp.id})">Delete</button>
                `;
                list.appendChild(div);
            });
        }

        // Add expense (CREATE)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                title: document.getElementById('title').value,
                amount: document.getElementById('amount').value,
                category: document.getElementById('category').value
            };
            await fetch('/api/expenses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            form.reset();
            loadExpenses();
        });

        // Delete expense (DELETE)
        async function deleteExpense(id) {
            await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
            loadExpenses();
        }

        loadExpenses();
    </script>
</body>
</html>
